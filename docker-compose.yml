services:
  app:
    # Imagen propia de PHP + Apache preparada con las extensiones que necesita Drupal.
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: estudiogenesis_drupal_app
    depends_on:
      - db
    ports:
      # Drupal estara disponible en http://localhost:8081 por defecto.
      - "${DRUPAL_PORT:-8081}:80"
    volumes:
      # Montamos el proyecto completo para que los cambios de codigo se vean al instante.
      - ./:/var/www/html
    environment:
      # Estos valores se usaran durante la instalacion de Drupal.
      DRUPAL_DB_HOST: db
      DRUPAL_DB_NAME: ${MYSQL_DATABASE:-studiogenesis_drupal}
      DRUPAL_DB_USER: ${MYSQL_USER:-drupal}
      DRUPAL_DB_PASSWORD: ${MYSQL_PASSWORD:-drupal}

  db:
    # La prueba tecnica pide explicitamente un motor de base de datos MySQL.
    image: mysql:8.4
    container_name: estudiogenesis_drupal_db
    ports:
      # Exponemos MySQL para poder usar herramientas externas y depurar con comodidad.
      - "${MYSQL_PORT:-3308}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-studiogenesis_drupal}
      MYSQL_USER: ${MYSQL_USER:-drupal}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-drupal}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      # Volumen con nombre: mantiene los datos aunque se recree el contenedor.
      - db_data:/var/lib/mysql

  phpmyadmin:
    # Gestor de base de datos en navegador para el entorno local.
    image: phpmyadmin:5-apache
    container_name: estudiogenesis_drupal_phpmyadmin
    depends_on:
      - db
    ports:
      # phpMyAdmin estara disponible en http://localhost:8082 por defecto.
      - "${PHPMYADMIN_PORT:-8082}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M

volumes:
  # Volumen gestionado por Docker para persistir la base de datos MySQL.
  db_data:
