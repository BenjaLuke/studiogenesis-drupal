<VirtualHost *:80>
    # Los proyectos Drupal creados con Composer exponen la web publica desde /web.
    DocumentRoot /var/www/html/web

    <Directory /var/www/html/web>
        # Permitimos que Drupal gestione rutas y URLs limpias mediante .htaccess.
        AllowOverride All
        Require all granted
    </Directory>

    # Enviamos los logs de Apache a Docker para verlos con docker compose logs.
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
