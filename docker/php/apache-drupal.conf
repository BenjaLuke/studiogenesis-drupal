<VirtualHost *:80>
    # Drupal projects created with Composer expose the public site from /web.
    DocumentRoot /var/www/html/web

    <Directory /var/www/html/web>
        # Allow Drupal routing and clean URLs through .htaccess.
        AllowOverride All
        Require all granted
    </Directory>

    # Send Apache logs to Docker so they are visible with docker compose logs.
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
